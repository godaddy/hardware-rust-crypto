name: SAW (LLVM bitcode proof)

# SAW (Galois) verifies rustc's LLVM bitcode of the intrinsic-free composition
# against a Cryptol spec: saw_increment_counter == SP 800-38D inc_32 and
# saw_j0 == J0 (proofs/saw/composition.saw). A third independent prover (own
# solvers) corroborating the Z3 + Kani proofs of the same property.
#
# Manual-only: SAW ships as a large prebuilt release bundle, too heavy to pull on
# every push. See proofs/saw/README.md and proofs/saw/run.sh.
on:
  workflow_dispatch:
    inputs:
      saw_version:
        description: "SAW release version"
        default: "1.5.1"

permissions:
  contents: read

jobs:
  saw:
    name: SAW LLVM-bitcode proof (composition)
    # Pinned so the prebuilt SAW asset name (ubuntu-24.04-X64) is deterministic.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-06-11
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Pull the prebuilt SAW release WITH its bundled solvers (Z3/Yices/etc.)
      # for this ubuntu-24.04 runner and put its bin/ on PATH. Direct release
      # download (no GitHub API) so it does not hit the unauthenticated rate limit.
      - name: Install SAW ${{ inputs.saw_version }} (with solvers)
        run: |
          set -euo pipefail
          ver="${{ inputs.saw_version }}"
          asset="saw-${ver}-ubuntu-24.04-X64-with-solvers.tar.gz"
          url="https://github.com/GaloisInc/saw-script/releases/download/v${ver}/${asset}"
          echo "asset: $url"
          curl -fSL --retry 3 -o saw.tar.gz "$url"
          mkdir -p "$HOME/saw"
          tar xzf saw.tar.gz -C "$HOME/saw" --strip-components=1
          echo "$HOME/saw/bin" >> "$GITHUB_PATH"
      - name: SAW version
        run: saw --version

      # Builds the crate to LLVM bitcode with the saw-verify wrappers and runs
      # the composition proof against the Cryptol spec.
      - name: Run SAW proofs
        run: ./proofs/saw/run.sh
