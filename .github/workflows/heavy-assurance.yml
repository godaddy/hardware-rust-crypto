name: Heavy assurance (manual)

# One-shot, manually triggered deep verification: the long/expensive runs that
# are impractical on every push. Run from the Actions tab ("Run workflow").
# Reproducible: each job documents the exact command it runs.
on:
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Seconds to fuzz each target"
        default: "1800"
      practrand_max:
        description: "PractRand max volume (e.g. 256GB, 1TB)"
        default: "256GB"

permissions:
  contents: read

jobs:
  valgrind-full:
    name: valgrind memcheck (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: sudo apt-get update && sudo apt-get install -y valgrind
      # memcheck the real AES-NI/PCLMULQDQ binaries across the ENTIRE suite
      # (the per-push job runs a subset). Fails on any definite error.
      - name: Build every test binary
        run: cargo test --no-run --release
      - name: memcheck all test binaries
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for bin in target/release/deps/*; do
            # Test binaries are extensionless executables in deps/.
            [ -f "$bin" ] && [ -x "$bin" ] || continue
            case "$bin" in *.*) continue;; esac
            echo "::group::valgrind $bin"
            valgrind --error-exitcode=1 --leak-check=full \
              --errors-for-leak-kinds=definite --track-origins=yes \
              "$bin" --test-threads=1
            echo "::endgroup::"
          done

  sanitizers-full:
    name: ${{ matrix.san }} (full suite)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        san: [address, thread, memory]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test under ${{ matrix.san }} (build-std)
        run: >
          cargo +nightly test -Z build-std --target x86_64-unknown-linux-gnu --release
        env:
          RUSTFLAGS: -Zsanitizer=${{ matrix.san }}
          RUSTDOCFLAGS: -Zsanitizer=${{ matrix.san }}

  deep-fuzz:
    name: deep fuzz (${{ inputs.fuzz_seconds }}s/target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz each target
        run: |
          set -euo pipefail
          for target in $(cargo +nightly fuzz list); do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" -- \
              -max_total_time=${{ inputs.fuzz_seconds }} -rss_limit_mb=8192
            echo "::endgroup::"
          done
      - name: Upload any crash artifacts
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/

  practrand-deep:
    name: PractRand deep + multi-seed + dieharder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: sudo apt-get update && sudo apt-get install -y dieharder
      - name: Build PractRand
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/MartyMacGyver/PractRand.git /tmp/practrand
          cd /tmp/practrand
          g++ -std=c++14 -O2 -Iinclude -pthread -c src/*.cpp src/RNGs/*.cpp src/RNGs/other/*.cpp
          g++ -std=c++14 -O2 -Iinclude -pthread *.o tools/RNG_test.cpp -o RNG_test
      - name: PractRand deep + multiple seeds
        run: |
          set -euo pipefail
          for seed in 0 1 2 3; do
            echo "::group::PractRand seed=$seed to ${{ inputs.practrand_max }}"
            RNG_DUMP_SEED=$seed cargo run --release --example rng_dump \
              | /tmp/practrand/RNG_test stdin64 -tlmin 1MB -tlmax ${{ inputs.practrand_max }} \
              | tee "pr_$seed.log"
            grep -Eiq 'FAIL|suspicious' "pr_$seed.log" && { echo "seed $seed FAILED" >&2; exit 1; } || true
            echo "::endgroup::"
          done
      - name: dieharder full suite
        run: |
          set -euo pipefail
          cargo run --release --example rng_dump | dieharder -g 200 -a | tee dieharder.log
          if grep -qi 'FAILED' dieharder.log; then
            echo "dieharder reported FAILED" >&2; exit 1
          fi

  proofs-extended:
    name: proofs (extended, generous limits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.12"
      - run: pip install z3-solver sympy
      - name: Full proof suite
        run: ./proofs/run_all.sh
