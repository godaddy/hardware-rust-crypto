name: Sanitizers (ASan/TSan)

# AddressSanitizer + ThreadSanitizer over the intrinsic binary, on both x86_64
# and Linux arm64 (so the ARMv8 AES/PMULL codegen is sanitized too). Runs on
# every push/PR and is individually runnable. The full-suite + MemorySanitizer
# variant lives in heavy-assurance.yml.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: sanitizers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitizers:
    name: ${{ matrix.sanitizer }} ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
        platform:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install nightly + rust-src
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # ASan catches heap/stack memory errors in the intrinsic binary; TSan
      # validates the `unsafe impl Send/Sync` and the cross-thread key-state
      # sharing claim.
      - name: Test under ${{ matrix.sanitizer }} sanitizer
        run: >
          cargo +nightly test -Z build-std --target ${{ matrix.platform.target }}
          --lib --test aes_gcm_interop --test aes_gcm_siv_interop
        env:
          RUSTFLAGS: -Zsanitizer=${{ matrix.sanitizer }}
          RUSTDOCFLAGS: -Zsanitizer=${{ matrix.sanitizer }}
