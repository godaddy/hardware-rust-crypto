name: crux-mir (Rust MIR proof)

# crux-mir (Galois) symbolically executes the Rust MIR and proves
# increment_counter == SP 800-38D inc_32 - a fourth independent toolchain
# alongside Z3, Kani/CBMC and SAW-LLVM, at the MIR level (no LLVM poison).
# clmul_probe.rs additionally establishes the intrinsic boundary (the carryless
# multiply is unmodeled), mirroring SAW-LLVM. See proofs/crux-mir/README.md.
#
# Runs on push/PR (the mir-json toolchain is cached, so warm runs are ~1 min) and
# is individually runnable. A cold cache rebuilds mir-json (~7 min).
on:
  workflow_dispatch:
    inputs:
      saw_version:
        description: "SAW release version (provides crux-mir-comp)"
        default: "1.5.1"
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: crux-mir-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crux-mir:
    name: crux-mir MIR proof (increment_counter)
    # Pinned so the prebuilt SAW asset name (ubuntu-24.04-X64) is deterministic.
    runs-on: ubuntu-24.04
    env:
      # Default for push/PR (inputs.* is only set on workflow_dispatch).
      SAW_VERSION: ${{ inputs.saw_version || '1.5.1' }}
      MIR_JSON_COMMIT: 48d0b4b2
      # mir-json is built for and must run under this exact nightly; forcing it
      # globally makes the temp crates that run.sh builds use it too.
      RUSTUP_TOOLCHAIN: nightly-2025-09-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # mir-json needs the compiler internals (rustc-dev) and rust-src of its
      # pinned nightly.
      - name: Install nightly-2025-09-14 (rustc-dev + rust-src)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly-2025-09-14
          components: rustc-dev, rust-src, llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # --- SAW bundle (provides crux-mir-comp), cached by version --------------
      - name: Cache SAW bundle
        id: cache-saw
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/saw
          key: saw-bundle-${{ env.SAW_VERSION }}-ubuntu-24.04
      - name: Download SAW bundle (cache miss)
        if: steps.cache-saw.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          ver="${SAW_VERSION}"
          asset="saw-${ver}-ubuntu-24.04-X64-with-solvers.tar.gz"
          url="https://github.com/GaloisInc/saw-script/releases/download/v${ver}/${asset}"
          echo "asset: $url"
          curl -fSL --retry 3 -o saw.tar.gz "$url"
          mkdir -p "$HOME/saw"
          tar xzf saw.tar.gz -C "$HOME/saw" --strip-components=1
      - name: Expose crux-mir-comp as crux-mir
        run: |
          set -euo pipefail
          ln -sf "$HOME/saw/bin/crux-mir-comp" "$HOME/saw/bin/crux-mir"
          echo "$HOME/saw/bin" >> "$GITHUB_PATH"

      # --- mir-json toolchain + translated rlibs, cached by commit ------------
      - name: Cache mir-json toolchain
        id: cache-mirjson
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/mirjson
            ~/mir-json/rlibs
          key: mir-json-${{ env.MIR_JSON_COMMIT }}-nightly-2025-09-14-ubuntu-24.04
      # mir-json (rustc -> MIR JSON) at the last schema-8 commit, which matches
      # SAW 1.5.1's crux-mir-comp (newer mir-json emits schema 10/11, rejected).
      # Installed to its own --root so the cache never clobbers rustup proxies.
      - name: Build mir-json (cache miss)
        if: steps.cache-mirjson.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone https://github.com/GaloisInc/mir-json "$HOME/mir-json"
          cd "$HOME/mir-json"
          git checkout "${MIR_JSON_COMMIT}"
          cargo install --path . --locked --root "$HOME/mirjson"
          # Translate the standard library to MIR JSON rlibs (run from the
          # checkout, which carries the libs/ tree).
          rm -rf rlibs
          PATH="$HOME/mirjson/bin:$PATH" mir-json-translate-libs
      - name: Put mir-json on PATH + set library path
        run: |
          echo "$HOME/mirjson/bin" >> "$GITHUB_PATH"
          echo "CRUX_RUST_LIBRARY_PATH=$HOME/mir-json/rlibs" >> "$GITHUB_ENV"

      - name: crux-mir / mir-json versions
        run: |
          crux-mir --version || true
          mir-json --version || true

      # Builds a tiny crate around each proofs/crux-mir/*.rs and runs
      # `cargo crux-test`. increment_counter.rs must prove Valid; clmul_probe.rs
      # is expected Invalid (unmodeled carryless-multiply) and does not fail the job.
      - name: Run crux-mir proofs
        run: ./proofs/crux-mir/run.sh
