name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# `packages: read` is required at the caller level so the reusable F* workflow can
# pull its prebuilt toolchain image from GHCR - a reusable workflow cannot be
# granted more permission than its caller, so omitting it fails the run at startup.
permissions:
  contents: read
  packages: read

jobs:
  # Release gate: the long-running F* source-level proof runs here rather than on
  # every PR. A release cannot publish unless j0/increment_counter still verify
  # against a fresh hax extraction. (SAW + crux-mir already gate on PR, so the
  # tagged commit has passed them.)
  fstar-gate:
    name: F* release gate
    uses: ./.github/workflows/fstar.yml

  publish:
    name: publish hardware-rust-crypto
    needs: fstar-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-06-11
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish hardware-rust-crypto
        # Idempotent: skip if this version is already on crates.io (e.g. a tag was
        # re-pushed or the job re-run), so it never fails on "already exists".
        run: |
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "hardware-rust-crypto") | .version')
          if curl -fsSL "https://index.crates.io/ha/rd/hardware-rust-crypto" \
               | grep -q "\"vers\":\"${version}\""; then
            echo "hardware-rust-crypto@${version} is already on crates.io — skipping publish."
          else
            cargo publish --package hardware-rust-crypto --locked
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
